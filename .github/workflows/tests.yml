name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
        laravel: ["10", "11", "12"]
        exclude:
          # Laravel 11+ requires PHP >= 8.2
          - php: "8.1"
            laravel: "11"
          - php: "8.1"
            laravel: "12"

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, openssl, json, pdo
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-php${{ matrix.php }}-laravel${{ matrix.laravel }}-
            ${{ runner.os }}-composer-php${{ matrix.php }}-

      - name: Install dependencies (Laravel ${{ matrix.laravel }})
        run: |
          composer require \
            "laravel/framework:^${{ matrix.laravel }}.0" \
            "orchestra/testbench:^$(( ${{ matrix.laravel }} - 2 ))" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Check code style (pint)
        run: composer lint:check

      - name: Run tests
        run: composer test
        env:
          GENVORIS_API_KEY: gvk_test_placeholder
          GENVORIS_WEBHOOK_SECRET: test_webhook_secret_placeholder
